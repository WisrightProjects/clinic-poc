# Runs the open-source Whisper STT sidecar locally with one command.
# Separate from the root docker-compose.yml (which only serves the static mockups on :3030).
#
#   docker compose -f docker-compose.stt.yml up --build
#
# The backend then talks to it via WHISPER_URL=http://localhost:8000 (the default).
services:
  whisper:
    build: ./stt-service
    ports:
      - "8000:8000"
    environment:
      WHISPER_MODEL: small          # bump to medium/large-v3 for more accuracy (needs more RAM)
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    volumes:
      # Cache the downloaded model between restarts so it isn't re-fetched each boot.
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  whisper-models:
