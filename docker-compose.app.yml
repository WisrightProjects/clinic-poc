# Full local stack: postgres + whisper (STT) + backend + doctor web.
# Mirrors the Coolify deployment. One command:
#
#   docker compose -f docker-compose.app.yml up --build
#
# Then: doctor web -> http://localhost:8080 , backend -> http://localhost:4000
# (The mobile Expo app runs separately and points at http://<host>:4000/api.)
#
# Note: the backend runs migrations on boot but NOT seeds. To load demo data, run
# `npm run seed` from the repo root against this DB (DATABASE_URL on host port 5433).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: clinic_poc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - clinic-db:/var/lib/postgresql/data
    ports:
      - "5433:5432" # host 5433 -> avoids clashing with a local Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinic_poc"]
      interval: 5s
      timeout: 3s
      retries: 10

  whisper:
    build: ./stt-service
    environment:
      WHISPER_MODEL: small # bump to medium/large-v3 for more accuracy (needs more RAM)
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    volumes:
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/clinic_poc
      STT_PROVIDER: whisper
      WHISPER_URL: http://whisper:8000
      STT_LANGUAGE: auto
      USE_MOCK_SUMMARY: "true"
      CORS_ORIGINS: http://localhost:8080,http://localhost:8081
      AUDIO_DIR: /app/uploads
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  clinic-db:
  whisper-models:
