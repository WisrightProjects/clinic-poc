# Full local stack: postgres + whisper (STT) + backend + doctor web.
# Mirrors the Coolify deployment. One command:
#
#   docker compose -f docker-compose.app.yml up --build
#
# Then: doctor web -> http://localhost:8080 , backend -> http://localhost:4000
# (The mobile Expo app runs separately and points at http://<host>:4000/api.)
#
# Note: the backend runs migrations on boot but NOT seeds. To load demo data, run
# `npm run seed` from the repo root against this DB (DATABASE_URL on host port 5433).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: doctor_attender
      POSTGRES_USER: postgres
      # Set POSTGRES_PASSWORD in Coolify (mark it a Secret). Falls back to 'postgres'
      # for local `docker compose up` only — never ship the default to production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - clinic-db:/var/lib/postgresql/data
    ports:
      - "5433:5432" # host 5433 -> avoids clashing with a local Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doctor_attender"]
      interval: 5s
      timeout: 3s
      retries: 10

  whisper:
    build:
      context: ./stt-service
      # The weights are baked into the image, so the model is chosen at BUILD time.
      # Bump to medium/large-v3 for more accuracy (needs more RAM) and rebuild.
      args:
        WHISPER_MODEL: small
        WHISPER_COMPUTE_TYPE: int8
    environment:
      WHISPER_NUM_WORKERS: "2" # concurrent transcriptions; each worker costs RAM
    # NO published port. The sidecar has no authentication — the backend reaches it on
    # the private compose network at http://whisper:8000 and nothing else can. Never
    # expose 8000 publicly. (docker-compose.stt.yml does publish it, for local dev only.)
    restart: unless-stopped

  backend:
    build:
      # Root context: server.js requires ../../db/run-migrations, which lives outside
      # backend/. A ./backend context omits it and the container crashloops on boot.
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Set DATABASE_URL in Coolify (mark it a Secret) to point at an external Postgres.
      # It must include the database name, e.g. postgresql://user:pass@host:5432/doctor_attender
      # — a URL ending at the port connects to no named database and the backend will fail.
      # When unset, falls back to the bundled postgres service for local `docker compose up`.
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/doctor_attender}
      STT_PROVIDER: whisper
      WHISPER_URL: http://whisper:8000
      STT_LANGUAGE: auto
      # Doctor-web origin(s), comma-separated. The mobile app calls the backend directly,
      # so if phones hit it cross-origin add that host here too. Set the real domain in Coolify.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:8081}
      # Summaries: 'mock' = canned text (no LLM). For real AI summaries set SUMMARY_PROVIDER=kimi
      # and KIMI_API_KEY in Coolify. Every knob below must be listed here to reach the
      # container — an env var Coolify sets but compose does not declare is silently dropped.
      SUMMARY_PROVIDER: ${SUMMARY_PROVIDER:-mock}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.ai/v1}
      KIMI_MODEL: ${KIMI_MODEL:-moonshot-v1-8k}
      SUMMARY_LANGUAGE: ${SUMMARY_LANGUAGE:-English}
      AUDIO_DIR: /app/uploads
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
      whisper:
        # Gate on the sidecar's healthcheck: the model takes ~30-60s to load, and until
        # it does every transcription would be saved as transcript_status='failed'.
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  clinic-db:
